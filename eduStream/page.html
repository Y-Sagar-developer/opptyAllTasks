<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>EduStream</title>
    <style>
        /* ---- PAGE ---- */
        body {
            font-family: Arial;
            background: #f0f4f8;
            margin: 0;
        }

        /* ---- HEADER ---- */
        header {
            background: white;
            padding: 14px 20px;
            border-bottom: 2px solid #ddd;
        }

        .row1 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 22px;
            color: #1e3a8a;
        }

        #badge {
            background: #eff6ff;
            color: #2563eb;
            border: 1px solid #bfdbfe;
            padding: 3px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 8px;
        }

        /* ---- FILTER BAR ---- */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        input[type=text] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            width: 180px;
        }

        select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .chk {
            font-size: 14px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ---- BUTTONS ---- */
        .btn-green {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-green:hover {
            background: #059669;
        }

        .btn-plain {
            background: none;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 15px;
            cursor: pointer;
        }

        /* ---- MAIN ---- */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ---- PAGINATION BAR ---- */
        #pagebar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #555;
            margin-bottom: 14px;
        }

        #pgbtns {
            display: flex;
            gap: 6px;
        }

        .pgbtn {
            padding: 5px 12px;
            border: 1px solid #ddd;
            border-radius: 7px;
            background: white;
            font-size: 13px;
            cursor: pointer;
        }

        .pgbtn:hover {
            background: #eff6ff;
            color: #2563eb;
        }

        .pgbtn.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .pgbtn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        /* ---- CARDS ---- */
        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform .2s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .08);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .dept {
            font-size: 11px;
            font-weight: bold;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .badge-open {
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 6px;
            background: #ecfdf5;
            color: #059669;
            border: 1px solid #bbf7d0;
        }

        .badge-full {
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 6px;
            background: #fff1f2;
            color: #e11d48;
            border: 1px solid #fecdd3;
        }

        .ctitle {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .cfaculty {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 14px;
        }

        .card-foot {
            margin-top: auto;
            border-top: 1px solid #f1f5f9;
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .slabel {
            font-size: 10px;
            font-weight: bold;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .sval {
            font-size: 14px;
            font-weight: bold;
        }

        .sval.red {
            color: #ef4444;
        }

        .bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin-top: 4px;
        }

        .bar-in {
            height: 100%;
            border-radius: 2px;
        }

        .btn-enroll {
            background: #2563eb;
            color: white;
            border: none;
            padding: 7px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-enroll:hover {
            background: #1d4ed8;
        }

        .btn-enroll:disabled {
            background: #f1f5f9;
            color: #94a3b8;
            border: 1px solid #ddd;
            cursor: default;
        }

        mark {
            background: #fef08a;
            color: #92400e;
            border-radius: 2px;
        }

        /* ---- NO RESULTS ---- */
        #noresult {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        /* ---- POPUP ---- */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .popup {
            background: white;
            border-radius: 16px;
            padding: 26px;
            width: 100%;
            max-width: 400px;
            animation: pop .2s ease;
        }

        @keyframes pop {
            from {
                transform: scale(.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .popup h2 {
            font-size: 17px;
            margin-bottom: 12px;
        }

        .drow {
            display: flex;
            justify-content: space-between;
            padding: 7px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        .drow:last-child {
            border: none;
        }

        .dk {
            color: #64748b;
        }

        .dv {
            font-weight: bold;
        }

        .btn-blue {
            background: #2563eb;
            color: white;
            border: none;
            padding: 11px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }

        .btn-blue:hover {
            background: #1d4ed8;
        }

        .btn-gray {
            background: #f1f5f9;
            color: #1e293b;
            border: none;
            padding: 11px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 6px;
        }

        .btn-gray:hover {
            background: #e2e8f0;
        }

        /* form fields */
        .field {
            margin-bottom: 12px;
        }

        .field label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 4px;
        }

        .field input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .twocol {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* ---- TOAST ---- */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 11px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            z-index: 200;
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        /* ---- DARK MODE ---- */
        body.dark {
            background: #0f172a;
            color: #f1f5f9;
        }

        body.dark header {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark .card {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark .popup {
            background: #1e293b;
        }

        body.dark input,
        body.dark select,
        body.dark .field input {
            background: #0f172a;
            color: #f1f5f9;
            border-color: #334155;
        }

        body.dark .btn-gray {
            background: #334155;
            color: #f1f5f9;
        }

        body.dark .pgbtn {
            background: #1e293b;
            color: #f1f5f9;
            border-color: #334155;
        }

        body.dark .pgbtn.active {
            background: #2563eb;
            color: white;
        }

        body.dark mark {
            background: #92400e;
            color: #fef08a;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #aaa;
            border-top: 1px solid #e2e8f0;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <header>
        <!-- Top row: logo + buttons -->
        <div class="row1">
            <div>
                <h1 style="display:inline;">📚 EduStream</h1>
                <span id="badge">0 Courses</span>
            </div>
            <div style="display:flex;gap:8px;">
                <button class="btn-green" onclick="openAddForm()">+ Add Course</button>
                <button class="btn-plain" id="darkBtn" onclick="toggleDark()">🌙</button>
            </div>
        </div>

        <!-- Filter row -->
        <div class="filters">
            <input type="text" id="search" placeholder="🔍 Search..." oninput="applyFilters()">
            <select id="dept" onchange="applyFilters()">
                <option value="all">All Departments</option>
            </select>
            <select id="sort" onchange="applyFilters()">
                <option value="">Sort: Default</option>
                <option value="asc">Seats: Low to High</option>
                <option value="desc">Seats: High to Low</option>
            </select>
            <label class="chk"><input type="checkbox" id="avail" onchange="applyFilters()"> Available Only</label>
            <button class="btn-plain" onclick="resetAll()">✕ Reset</button>
        </div>
    </header>

    <main>
        <!-- Pagination bar -->
        <div id="pagebar">
            <span id="pginfo">Showing 0 courses</span>
            <div id="pgbtns"></div>
        </div>

        <!-- Cards grid -->
        <div id="grid"></div>

        <!-- No results message -->
        <div id="noresult">
            <p style="font-size:40px;">🔍</p>
            <h2>No courses found</h2>
            <p>Try a different search or reset filters.</p>
            <br>
            <button class="btn-blue" style="width:auto;padding:9px 24px;" onclick="resetAll()">Reset Filters</button>
        </div>
    </main>

    <footer>© 2024 EduStream · University Course Hub</footer>

    <script>

        // ==============================
        // 1. OUR DATA
        // ==============================

        var courses = [];    // all courses
        var shown = [];    // courses after filter
        var page = 1;     // current page number
        var perPage = 6;     // cards per page
        var keyword = '';    // search word

        // ==============================
        // 2. DEFAULT COURSE LIST
        // ==============================

        var defaultCourses = [
            { id: 1, title: "Neural Networks 101", dept: "Computer Science", faculty: "Dr. Aris", seats: 12, max: 50 },
            { id: 2, title: "Modernist Literature", dept: "English", faculty: "Prof. Sterling", seats: 0, max: 30 },
            { id: 3, title: "Macroeconomics", dept: "Business", faculty: "Prof. Zhang", seats: 45, max: 100 },
            { id: 4, title: "Inorganic Chemistry", dept: "Science", faculty: "Dr. Kovac", seats: 5, max: 40 },
            { id: 5, title: "UI/UX Design Systems", dept: "Digital Arts", faculty: "Prof. Miller", seats: 2, max: 15 },
            { id: 6, title: "Criminal Law Foundations", dept: "Law", faculty: "Judge Rehnquist", seats: 25, max: 30 },
            { id: 7, title: "Astrophysics II", dept: "Science", faculty: "Dr. Tyson", seats: 0, max: 12 },
            { id: 8, title: "Public Health Policy", dept: "Medicine", faculty: "Dr. Fauci", seats: 80, max: 120 },
            { id: 9, title: "Data Structures", dept: "Computer Science", faculty: "Dr. Gupta", seats: 18, max: 60 },
            { id: 10, title: "World History", dept: "History", faculty: "Prof. Lee", seats: 30, max: 80 },
            { id: 11, title: "Organic Chemistry", dept: "Science", faculty: "Dr. Patel", seats: 10, max: 35 },
            { id: 12, title: "Business Ethics", dept: "Business", faculty: "Prof. Adams", seats: 20, max: 50 }
        ];

        // ==============================
        // 3. SAVE & LOAD (localStorage)
        // ==============================

        function save() {
            localStorage.setItem('courses', JSON.stringify(courses));
        }

        function load() {
            var raw = localStorage.getItem('courses');
            return raw ? JSON.parse(raw) : null;
        }

        // ==============================
        // 4. START APP
        // ==============================

        function init() {
            // Restore dark mode
            if (localStorage.getItem('dark') === 'true') toggleDark();

            // Load saved or default courses
            var saved = load();
            courses = (saved && saved.length > 0) ? saved : defaultCourses;

            // Build dept dropdown
            buildDeptDropdown();

            // Show cards
            applyFilters();
        }

        // ==============================
        // 5. BUILD DEPARTMENT DROPDOWN
        // ==============================

        function buildDeptDropdown() {
            // Get unique dept names
            var depts = [];
            for (var i = 0; i < courses.length; i++) {
                if (depts.indexOf(courses[i].dept) === -1) {
                    depts.push(courses[i].dept);
                }
            }
            depts.sort();

            var sel = document.getElementById('dept');
            sel.innerHTML = '<option value="all">All Departments</option>';
            for (var j = 0; j < depts.length; j++) {
                sel.innerHTML += '<option value="' + depts[j] + '">' + depts[j] + '</option>';
            }
        }

        // ==============================
        // 6. FILTER + SORT
        // ==============================

        function applyFilters() {
            keyword = document.getElementById('search').value.trim().toLowerCase();
            var dept = document.getElementById('dept').value;
            var sort = document.getElementById('sort').value;
            var avail = document.getElementById('avail').checked;

            // Copy all courses into result
            var result = courses.slice();

            // Filter by dept
            if (dept !== 'all') {
                result = result.filter(function (c) { return c.dept === dept; });
            }

            // Filter to available seats only
            if (avail) {
                result = result.filter(function (c) { return c.seats > 0; });
            }

            // Filter by search keyword
            if (keyword) {
                result = result.filter(function (c) {
                    return c.title.toLowerCase().indexOf(keyword) > -1
                        || c.dept.toLowerCase().indexOf(keyword) > -1
                        || c.faculty.toLowerCase().indexOf(keyword) > -1;
                });
            }

            // Sort
            if (sort === 'asc') result.sort(function (a, b) { return a.seats - b.seats; });
            if (sort === 'desc') result.sort(function (a, b) { return b.seats - a.seats; });

            shown = result;
            page = 1;       // always reset to page 1 after filter
            render();
        }

        // ==============================
        // 7. RENDER CARDS + PAGINATION
        // ==============================

        function render() {
            var grid = document.getElementById('grid');
            var noResult = document.getElementById('noresult');
            var pagebar = document.getElementById('pagebar');

            grid.innerHTML = '';

            // Nothing found?
            if (shown.length === 0) {
                noResult.style.display = 'block';
                pagebar.style.display = 'none';
                document.getElementById('badge').textContent = '0 Courses';
                return;
            }

            noResult.style.display = 'none';
            pagebar.style.display = 'flex';

            var total = shown.length;
            var totalPages = Math.ceil(total / perPage);   // e.g. 12 courses / 6 = 2 pages
            var start = (page - 1) * perPage;         // page 1 = start 0, page 2 = start 6
            var end = Math.min(start + perPage, total);

            // Update badge and page info text
            document.getElementById('badge').textContent = total + ' Courses';
            document.getElementById('pginfo').textContent = 'Showing ' + (start + 1) + '-' + end + ' of ' + total;

            // Draw only the cards for this page
            for (var i = start; i < end; i++) {
                grid.appendChild(makeCard(shown[i]));
            }

            // Draw prev/next/number buttons
            makePagination(totalPages);
        }

        // ==============================
        // 8. PAGINATION BUTTONS
        // ==============================

        function makePagination(totalPages) {
            var container = document.getElementById('pgbtns');
            container.innerHTML = '';

            // ← Prev button
            var prev = document.createElement('button');
            prev.className = 'pgbtn';
            prev.textContent = '← Prev';
            prev.disabled = (page === 1);
            prev.onclick = function () { page--; render(); };
            container.appendChild(prev);

            // Number buttons
            for (var i = 1; i <= totalPages; i++) {
                var btn = document.createElement('button');
                btn.className = 'pgbtn' + (i === page ? ' active' : '');
                btn.textContent = i;
                btn.onclick = (function (p) { return function () { page = p; render(); }; })(i);
                container.appendChild(btn);
            }

            // Next → button
            var next = document.createElement('button');
            next.className = 'pgbtn';
            next.textContent = 'Next →';
            next.disabled = (page === totalPages);
            next.onclick = function () { page++; render(); };
            container.appendChild(next);
        }

        // ==============================
        // 9. MAKE ONE CARD
        // ==============================

        function makeCard(c) {
            var full = c.seats <= 0;
            var pct = Math.round(c.seats / c.max * 100);
            var color = pct > 30 ? '#10b981' : pct > 10 ? '#f59e0b' : '#ef4444';

            // Highlight matching search text in yellow
            function hl(text) {
                if (!keyword) return text;
                var safe = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                return text.replace(new RegExp('(' + safe + ')', 'gi'), '<mark>$1</mark>');
            }

            var card = document.createElement('div');
            card.className = 'card';
            card.onclick = function (e) {
                if (e.target.className === 'btn-enroll') return;  // don't open popup on enroll click
                openDetails(c);
            };

            card.innerHTML =
                '<div class="card-top">' +
                '<span class="dept">' + hl(c.dept) + '</span>' +
                '<span class="' + (full ? 'badge-full' : 'badge-open') + '">' + (full ? 'FULL' : 'OPEN') + '</span>' +
                '</div>' +
                '<div class="ctitle">' + hl(c.title) + '</div>' +
                '<div class="cfaculty">👤 ' + hl(c.faculty) + '</div>' +
                '<div class="card-foot">' +
                '<div>' +
                '<div class="slabel">Seats</div>' +
                '<div class="sval' + (full ? ' red' : '') + '">' + (full ? 'Full' : c.seats + ' / ' + c.max) + '</div>' +
                '<div class="bar"><div class="bar-in" style="width:' + (full ? 100 : pct) + '%;background:' + (full ? '#ef4444' : color) + '"></div></div>' +
                '</div>' +
                '<button class="btn-enroll" ' + (full ? 'disabled' : '') + ' onclick="enroll(' + c.id + ',event)">' +
                (full ? 'Locked' : 'Enroll') +
                '</button>' +
                '</div>';

            return card;
        }

        // ==============================
        // 10. ENROLL IN A COURSE
        // ==============================

        function enroll(id, e) {
            e.stopPropagation();   // stop card click
            var c = courses.filter(function (x) { return x.id === id; })[0];
            if (!c || c.seats <= 0) return;

            var ov = popup(
                'Confirm Enrollment',
                '<p style="color:#555;font-size:14px;">Enroll in <strong>' + c.title + '</strong>?<br>' +
                '<span style="color:#059669;font-weight:bold;">' + c.seats + ' seat(s) left</span></p>',
                true
            );

            ov.querySelector('#okBtn').onclick = function () {
                c.seats--;         // remove 1 seat
                save();
                ov.remove();
                applyFilters();
                toast('Enrolled in "' + c.title + '"!', 'success');
            };
        }

        // ==============================
        // 11. COURSE DETAILS POPUP
        // ==============================

        function openDetails(c) {
            var full = c.seats <= 0;
            var pct = Math.round(c.seats / c.max * 100);

            var ov = popup(
                c.title,
                '<div class="drow"><span class="dk">Department</span><span class="dv">' + c.dept + '</span></div>' +
                '<div class="drow"><span class="dk">Faculty</span>   <span class="dv">' + c.faculty + '</span></div>' +
                '<div class="drow"><span class="dk">Seats Left</span><span class="dv' + (full ? ' red' : '') + '">' + (full ? 'Full' : c.seats) + '</span></div>' +
                '<div class="drow"><span class="dk">Capacity</span>  <span class="dv">' + c.max + '</span></div>' +
                '<div class="drow"><span class="dk">Filled</span>    <span class="dv">' + (100 - pct) + '%</span></div>' +
                '<div class="bar" style="margin-top:12px;height:6px;"><div class="bar-in" style="width:' + (full ? 100 : pct) + '%;background:' + (full ? '#ef4444' : '#10b981') + '"></div></div>',
                !full
            );

            if (!full) {
                ov.querySelector('#okBtn').onclick = function () {
                    ov.remove();
                    enroll(c.id, { stopPropagation: function () { } });
                };
            }
        }

        // ==============================
        // 12. ADD COURSE FORM
        // ==============================

        function openAddForm() {
            var ov = document.createElement('div');
            ov.className = 'overlay';
            ov.innerHTML =
                '<div class="popup" style="max-width:440px;">' +
                '<h2>Add New Course</h2>' +
                '<div class="twocol">' +
                '<div class="field"><label>Title *</label><input id="fT" placeholder="e.g. Data Science"></div>' +
                '<div class="field"><label>Department *</label><input id="fD" placeholder="e.g. Science"></div>' +
                '</div>' +
                '<div class="field"><label>Faculty *</label><input id="fF" placeholder="e.g. Dr. Smith"></div>' +
                '<div class="twocol">' +
                '<div class="field"><label>Available Seats *</label><input id="fS" type="number" min="0" placeholder="30"></div>' +
                '<div class="field"><label>Total Capacity *</label><input id="fM" type="number" min="1" placeholder="50"></div>' +
                '</div>' +
                '<button class="btn-blue" onclick="submitForm()">+ Add Course</button>' +
                '<button class="btn-gray" onclick="this.closest(\'.overlay\').remove()">Cancel</button>' +
                '</div>';
            document.body.appendChild(ov);
            ov.onclick = function (e) { if (e.target === ov) ov.remove(); };
        }

        function submitForm() {
            var title = document.getElementById('fT').value.trim();
            var dept = document.getElementById('fD').value.trim();
            var faculty = document.getElementById('fF').value.trim();
            var seats = parseInt(document.getElementById('fS').value);
            var max = parseInt(document.getElementById('fM').value);

            if (!title || !dept || !faculty || isNaN(seats) || isNaN(max)) {
                toast('Please fill all fields!', 'error'); return;
            }
            if (seats > max) {
                toast('Seats cannot exceed capacity!', 'error'); return;
            }

            courses.push({ id: Date.now(), title: title, dept: dept, faculty: faculty, seats: seats, max: max });
            save();
            buildDeptDropdown();
            applyFilters();
            document.querySelector('.overlay').remove();
            toast('"' + title + '" added!', 'success');
        }

        // ==============================
        // 13. HELPER: MAKE A POPUP
        // ==============================

        function popup(title, bodyHTML, showOkBtn) {
            var ov = document.createElement('div');
            ov.className = 'overlay';
            ov.innerHTML =
                '<div class="popup">' +
                '<h2>' + title + '</h2>' +
                '<div>' + bodyHTML + '</div>' +
                (showOkBtn ? '<button class="btn-blue" id="okBtn">✓ Confirm</button>' : '') +
                '<button class="btn-gray" onclick="this.closest(\'.overlay\').remove()">Close</button>' +
                '</div>';
            document.body.appendChild(ov);
            ov.onclick = function (e) { if (e.target === ov) ov.remove(); };
            return ov;
        }

        // ==============================
        // 14. DARK MODE
        // ==============================

        function toggleDark() {
            document.body.classList.toggle('dark');
            var on = document.body.classList.contains('dark');
            document.getElementById('darkBtn').textContent = on ? '☀️' : '🌙';
            localStorage.setItem('dark', on);
        }

        // ==============================
        // 15. RESET ALL FILTERS
        // ==============================

        function resetAll() {
            document.getElementById('search').value = '';
            document.getElementById('dept').value = 'all';
            document.getElementById('sort').value = '';
            document.getElementById('avail').checked = false;
            keyword = '';
            applyFilters();
        }

        // ==============================
        // 16. TOAST MESSAGE
        // ==============================

        function toast(msg, type) {
            var old = document.querySelector('.toast');
            if (old) old.remove();

            var t = document.createElement('div');
            t.className = 'toast ' + type;
            t.textContent = msg;
            document.body.appendChild(t);

            setTimeout(function () { t.remove(); }, 3000);
        }

        // ==============================
        // START!
        // ==============================
        window.onload = init;

    </script>
</body>

</html>
