<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typing Test</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-6 rounded shadow w-full max-w-2xl">

<!-- 🔹 EMAIL FORM -->
<div id="emailSection">
    <h2 class="text-xl mb-3">Enter Email</h2>
    <input type="email" id="userEmail" class="border p-2 w-full mb-3" placeholder="Enter your email">
    <button id="startTestBtn" class="bg-blue-500 text-white px-4 py-2 rounded">Start Test</button>
</div>

<!-- 🔹 TYPING TEST -->
<div id="testSection" style="display:none;">
    <h1 class="text-2xl text-center mb-4">Typing Speed</h1>

    <div id="textDisplay" class="border p-3 mb-3"></div>

    <textarea id="inputField" class="border w-full p-2" placeholder="Start typing..." disabled></textarea>

    <div class="flex justify-between mt-3">
        <p>Time: <span id="timer">60</span></p>
        <p>WPM: <span id="wpm">0</span></p>
        <p>Accuracy: <span id="accuracy">100</span>%</p>
    </div>

    <div id="result" class="mt-3 text-center"></div>
</div>

</div>

<script>
emailjs.init("w69lXskj79HzRk-_0");

const emailInput = document.getElementById("userEmail");
const startTestBtn = document.getElementById("startTestBtn");

const emailSection = document.getElementById("emailSection");
const testSection = document.getElementById("testSection");

const textDisplay = document.getElementById("textDisplay");
const inputField = document.getElementById("inputField");
const timerEl = document.getElementById("timer");
const wpmEl = document.getElementById("wpm");
const accuracyEl = document.getElementById("accuracy");
const resultEl = document.getElementById("result");

let timer = 60;
let interval;
let startTime;
let userEmail = "";

const text = "Typing speed is a useful skill in today’s digital world.";

function renderText() {
    textDisplay.innerHTML = "";
    text.split("").forEach(c => {
        const span = document.createElement("span");
        span.innerText = c;
        textDisplay.appendChild(span);
    });
}

startTestBtn.onclick = () => {
    if (emailInput.value === "") {
        alert("Enter email first!");
        return;
    }

    userEmail = emailInput.value;

    emailSection.style.display = "none";
    testSection.style.display = "block";

    renderText();
    inputField.disabled = false;
    inputField.focus();

    startTime = new Date();

    interval = setInterval(() => {
        timer--;
        timerEl.innerText = timer;
        if (timer === 0) endTest();
    }, 1000);
};

inputField.addEventListener("input", () => {
    const input = inputField.value.split("");
    const spans = textDisplay.querySelectorAll("span");

    let correct = 0;

    spans.forEach((span, i) => {
        if (input[i] === span.innerText) {
            span.style.color = "green";
            correct++;
        } else {
            span.style.color = "red";
        }
    });

    const accuracy = (correct / input.length) * 100 || 100;
    accuracyEl.innerText = accuracy.toFixed(0);

    const time = (new Date() - startTime) / 60000;
    const wpm = Math.round((input.length / 5) / time || 0);
    wpmEl.innerText = wpm;

    if (input.length === spans.length) endTest();
});

function endTest() {
    clearInterval(interval);
    inputField.disabled = true;

    const resultText = `WPM: ${wpmEl.innerText}, Accuracy: ${accuracyEl.innerText}%`;
    resultEl.innerText = resultText;

    // 🔥 SEND EMAIL
    emailjs.send("service_75kj3mv", "template_2qvgujp", {
        to_email: userEmail,
        message: resultText
    }).then(() => {
        alert("Result sent to your email!");
    });
}
</script>

</body>
</html>
