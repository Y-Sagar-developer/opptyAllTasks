<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typing Speed</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-2xl">

<!-- FORM -->
<div id="formSection">
    <h2 class="text-xl mb-3">Enter Details</h2>
    <input type="text" id="name" placeholder="Name" class="border p-2 w-full mb-2">
    <input type="email" id="email" placeholder="Email" class="border p-2 w-full mb-3">
    <button id="startTestBtn" class="bg-blue-500 text-white px-4 py-2 rounded">Start Test</button>
</div>

<!-- TEST -->
<div id="testSection" style="display:none;">
    <h1 class="text-2xl font-bold text-center mb-4">Typing Speed</h1>

    <div class="flex justify-between mb-4">
        <select id="difficulty" class="border px-2 py-1">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>

        <button id="restartBtn" class="bg-red-500 text-white px-3 py-1">Restart</button>
    </div>

    <div id="textDisplay" class="border p-3 mb-3"></div>
    <textarea id="inputField" class="border w-full p-2 mb-3" disabled></textarea>

    <div class="flex justify-between">
        <p>Time: <span id="timer">60</span></p>
        <p>WPM: <span id="wpm">0</span></p>
        <p>Accuracy: <span id="accuracy">100</span>%</p>
    </div>

    <div id="result" class="mt-3 text-center"></div>
</div>

</div>

<script>
// FORM
const formSection = document.getElementById("formSection");
const testSection = document.getElementById("testSection");
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const startTestBtn = document.getElementById("startTestBtn");

let userName = "";
let userEmail = "";

// TEST ELEMENTS
const textDisplay = document.getElementById("textDisplay");
const inputField = document.getElementById("inputField");
const timerEl = document.getElementById("timer");
const wpmEl = document.getElementById("wpm");
const accuracyEl = document.getElementById("accuracy");
const resultEl = document.getElementById("result");
const restartBtn = document.getElementById("restartBtn");
const difficultySelect = document.getElementById("difficulty");

let timer = 60;
let interval;
let startTime;

const texts = {
    easy: ["I like to learn new things every day."],
    medium: ["Typing speed is a useful skill in today’s digital world."],
    hard: ["In the modern era of technology, efficient typing skills are essential."]
};

// START FORM
startTestBtn.onclick = () => {
    if (nameInput.value === "" || emailInput.value === "") {
        alert("Enter name & email");
        return;
    }

    userName = nameInput.value;
    userEmail = emailInput.value;

    formSection.style.display = "none";
    testSection.style.display = "block";

    startTest();
};

// START TEST
function startTest() {
    clearInterval(interval);

    const text = texts[difficultySelect.value][0];
    renderText(text);

    inputField.value = "";
    inputField.disabled = false;
    inputField.focus();

    timer = 60;
    timerEl.innerText = timer;
    startTime = new Date();

    interval = setInterval(() => {
        timer--;
        timerEl.innerText = timer;
        if (timer === 0) endTest();
    }, 1000);
}

// RENDER TEXT
function renderText(text) {
    textDisplay.innerHTML = "";
    text.split("").forEach(c => {
        const span = document.createElement("span");
        span.innerText = c;
        textDisplay.appendChild(span);
    });
}

// TYPING LOGIC
inputField.addEventListener("input", () => {
    const input = inputField.value.split("");
    const spans = textDisplay.querySelectorAll("span");

    let correct = 0;
    let totalTyped = input.length;

    spans.forEach((span, i) => {
        const char = input[i];

        if (char == null) {
            span.style.color = "black";
        } 
        else if (char === span.innerText) {
            span.style.color = "green";
            correct++;
        } 
        else {
            span.style.color = "red";
        }
    });

    // ✅ ACCURACY (space mistakes also counted)
    const accuracy = totalTyped > 0 ? (correct / totalTyped) * 100 : 100;
    accuracyEl.innerText = accuracy.toFixed(0);

    // ✅ WPM
    const time = (new Date() - startTime) / 60000;
    const wpm = Math.round((totalTyped / 5) / time || 0);
    wpmEl.innerText = wpm;

    // AUTO END
    if (input.length === spans.length) endTest();
});

// END TEST
function endTest() {
    clearInterval(interval);
    inputField.disabled = true;

    const resultText = `Name: ${userName}, WPM: ${wpmEl.innerText}, Accuracy: ${accuracyEl.innerText}%`;
    resultEl.innerText = resultText;

    // SAVE
    localStorage.setItem("result", JSON.stringify({
        name: userName,
        email: userEmail,
        wpm: wpmEl.innerText,
        accuracy: accuracyEl.innerText
    }));

    // SEND MAIL
    fetch("http://localhost:5000/send-mail", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: userName,
            email: userEmail,
            wpm: wpmEl.innerText,
            accuracy: accuracyEl.innerText
        })
    })
    .then(res => res.text())
    .then(data => alert(data))
    .catch(() => alert("Error sending mail"));
}

// RESTART
restartBtn.onclick = () => {
    startTest();
};
</script>

</body>
</html>
