


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Tasks</title>
    <style>
        body {
            background: #f0f0f0;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h2 {
            color: #333;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            width: 300px;
            display: inline-block;
            vertical-align: top;
        }

        input {
            padding: 8px;
            width: 100%;
            margin-bottom: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 4px;
        }

        button:hover {
            background: #45a049;
        }

        .count {
            font-size: 36px;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <!-- Task 1 -->
    <div class="box">
        <h2>Custom Heading</h2>
        <h3 id="userText">Your Heading</h3>
        <input type="text" id="ip1" placeholder="Enter heading">
        <button onclick="setCustomHeading()">Set</button>
    </div>

    <!-- Task 2 -->
    <div class="box">
        <h2>Background Color</h2>
        <button onclick="changeBgColor()">Change Color</button>
    </div>

    <!-- Task 3 -->
    <div class="box">
        <h2>Live Clock</h2>
        <p id="timeDisplay">--:--:--</p>
        <button onclick="startTime()">Start</button>
        <button onclick="stopTime()">Stop</button>
    </div>

    <!-- Task 4 -->
    <div class="box">
        <h2>Counter</h2>
        <div class="count" id="count">0</div>
        <button onclick="decrement()">-</button>
        <button onclick="resetCounter()">Reset</button>
        <button onclick="increment()">+</button>
    </div>

    <!-- Task 5 & 6 -->
    <div class="box">
        <h2>Controls</h2>
        <button onclick="resetAll()">Reset All</button>
        <button onclick="toggleDark()">Dark Mode</button>
    </div>

<script>
    let counter = 0;
    let timer = null;

    function setCustomHeading() {
        let ip = document.getElementById("ip1");
        document.getElementById("userText").innerText = ip.value;
        ip.value = "";
    }

    function changeBgColor() {
        let r = Math.floor(Math.random() * 256);
        let g = Math.floor(Math.random() * 256);
        let b = Math.floor(Math.random() * 256);
        document.body.style.background = `rgb(${r},${g},${b})`;
    }

    function startTime() {
        if (timer) return;
        timer = setInterval(() => {
            document.getElementById("timeDisplay").innerText = new Date().toLocaleTimeString();
        }, 1000);
    }

    function stopTime() {
        clearInterval(timer);
        timer = null;
    }

    function updateCount() {
        let el = document.getElementById("count");
        el.innerText = counter;
        el.style.color = counter > 0 ? "green" : counter < 0 ? "red" : "black";
    }

    function increment() { counter++; updateCount(); }
    function decrement() { counter--; updateCount(); }
    function resetCounter() { counter = 0; updateCount(); }

    function resetAll() {
        document.getElementById("userText").innerText = "Your Heading";
        document.getElementById("ip1").value = "";
        document.body.style.background = "#f0f0f0";
        stopTime();
        document.getElementById("timeDisplay").innerText = "--:--:--";
        counter = 0;
        updateCount();
    }

    function toggleDark() {
        document.body.style.background = "#111";
        document.body.style.color = "white";
    }
</script>

</body>
</html>
