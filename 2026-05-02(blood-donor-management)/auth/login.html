<!DOCTYPE html>
<!--
  auth/login.html
  ─────────────────────────────────────────────
  Login and Register page for GiftOfLife.
  Uses a tab switcher — both forms live here.
  On success, redirects to dashboard/index.html.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GiftOfLife — Login</title>
  <link rel="icon" type="image/png" href="../blood.png">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Shared stylesheet -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Floating blood drops background -->
  <div class="blood-drops" aria-hidden="true">
    <span class="drop">🩸</span>
    <span class="drop">🩸</span>
    <span class="drop">🩸</span>
    <span class="drop">🩸</span>
    <span class="drop">🩸</span>
    <span class="drop">🩸</span>
    <span class="drop">🩸</span>
    <span class="drop">🩸</span>
    <span class="drop">🩸</span>
    <span class="drop">🩸</span>
    <span class="drop">🩸</span>
    <span class="drop">🩸</span>
  </div>

  <!-- AUTH PAGE -->
  <div id="page-auth" class="page active">
    <div class="auth-card">

      <!-- Logo -->
      <div class="logo-area">
        <div class="logo-drop">🩸</div>
        <div class="logo-title">GiftOf<span style="color:var(--red)">Life</span></div>
        <div class="logo-sub">Blood Donor Management System</div>
      </div>

      <!-- Tab switcher: Login / Register -->
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
        <button class="tab-btn" onclick="switchAuthTab('signup')">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="auth-login" class="auth-form">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="admin@giftoflife.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" style="margin-top:8px" onclick="doLogin()">Sign In →</button>
      </div>

      <!-- REGISTER FORM (hidden by default) --><div id="auth-signup" class="auth-form" style="display:none">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Dr. Sagar yarra">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="reg-email" placeholder="you@hospital.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-pass" placeholder="••••••••">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="reg-role">
            <option value="admin">Hospital Admin</option>
            <option value="staff">Blood Bank Staff</option>
            <option value="doctor">Doctor</option>
          </select>
        </div>
        <button class="btn btn-primary" style="margin-top:8px" onclick="doRegister()">Create Account →</button>
      </div>



    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <!-- Shared JavaScript -->
  <script src="../js/app.js"></script>
</body>
</html>
